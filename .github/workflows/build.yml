name: Build Desktop App

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        shell: pwsh
        working-directory: backend
        run: pyinstaller cadviewer-api.spec --distpath dist --noconfirm --clean

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Build Electron (compile only)
        shell: pwsh
        working-directory: frontend
        run: npm run build:electron

      - name: List build output
        shell: pwsh
        working-directory: frontend
        run: Get-ChildItem -Recurse out/ | Select-Object FullName

      - name: Package Electron Windows
        shell: pwsh
        working-directory: frontend
        run: npx electron-builder --win --publish=never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadviewer-windows
          path: |
            frontend/release/*.exe
            frontend/release/*.blockmap
          if-no-files-found: error
