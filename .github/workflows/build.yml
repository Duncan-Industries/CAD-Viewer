name: Build Desktop App

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    permissions:
      contents: write   # needed to create/upload GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        shell: pwsh
        working-directory: backend
        run: pyinstaller cadviewer-api.spec --distpath dist --noconfirm --clean

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Verify PyInstaller binary was built
        shell: pwsh
        run: |
          if (-not (Test-Path "backend/dist/cadviewer-api.exe")) {
            Write-Error "cadviewer-api.exe not found in backend/dist/ — PyInstaller build failed"
            exit 1
          }
          Write-Host "cadviewer-api.exe found: $((Get-Item backend/dist/cadviewer-api.exe).Length) bytes"

      - name: Smoke test bundled backend imports
        shell: pwsh
        run: |
          & "backend/dist/cadviewer-api.exe" --self-test

      - name: Build Electron (compile only)
        shell: pwsh
        working-directory: frontend
        run: npm run build:electron

      - name: List build output
        shell: pwsh
        working-directory: frontend
        run: Get-ChildItem -Recurse out/ | Select-Object FullName

      - name: Package Electron Windows
        shell: pwsh
        working-directory: frontend
        run: npx electron-builder --win --x64 --publish=never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadviewer-windows
          path: |
            frontend/release/*.exe
            frontend/release/*.blockmap
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: CADViewer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            frontend/release/*.exe
            frontend/release/*.blockmap

      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: CADViewer (latest)
          body: "Latest build from `${{ github.sha }}` · ${{ github.ref_name }}"
          draft: false
          prerelease: true
          make_latest: false
          files: |
            frontend/release/*.exe
            frontend/release/*.blockmap
