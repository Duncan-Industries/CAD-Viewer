name: Build Desktop App

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    permissions:
      contents: write   # needed to create/upload GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        shell: pwsh
        working-directory: backend
        run: pyinstaller cadviewer-api.spec --distpath dist --noconfirm --clean

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Download uv for bundling
        shell: pwsh
        run: |
          $dest = "frontend/build-resources/uv"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $out = "$dest/uv.exe"
          if (-not (Test-Path $out)) {
            $tag = (Invoke-RestMethod "https://api.github.com/repos/astral-sh/uv/releases/latest").tag_name
            Invoke-WebRequest `
              -Uri "https://github.com/astral-sh/uv/releases/download/$tag/uv-x86_64-pc-windows-msvc.zip" `
              -OutFile "$dest/uv.zip"
            Expand-Archive -Force -Path "$dest/uv.zip" -DestinationPath "$dest/uv-extracted"
            $uvBin = Get-ChildItem -Recurse -Filter "uv.exe" "$dest/uv-extracted" | Select-Object -First 1
            Move-Item -Force $uvBin.FullName "$dest/uv.exe"
            Remove-Item -Recurse -Force "$dest/uv.zip","$dest/uv-extracted"
          }

      - name: Build Electron (compile only)
        shell: pwsh
        working-directory: frontend
        run: npm run build:electron

      - name: List build output
        shell: pwsh
        working-directory: frontend
        run: Get-ChildItem -Recurse out/ | Select-Object FullName

      - name: Package Electron Windows
        shell: pwsh
        working-directory: frontend
        run: npx electron-builder --win --publish=never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cadviewer-windows
          path: |
            frontend/release/*.exe
            frontend/release/*.blockmap
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CADViewer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            frontend/release/*.exe
            frontend/release/*.blockmap
