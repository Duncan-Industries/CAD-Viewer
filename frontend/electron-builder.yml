appId: com.cadviewer.app
productName: CADViewer
copyright: Copyright © 2025

directories:
  output: release
  buildResources: build-resources

# What goes inside the ASAR archive (renderer + electron bootstrap)
files:
  - out
  - package.json
  - "!**/*.map"

# The PyInstaller binary is placed outside ASAR in resources/backend/
extraResources:
  - from: ../backend/dist/
    to: backend
    filter:
      - "cadviewer-api"
      - "cadviewer-api.exe"

# ------- Platform targets -------

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  sign: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
