appId: com.cadviewer.app
productName: CADViewer
copyright: Copyright © 2025

directories:
  output: release
  buildResources: build-resources

# What goes inside the ASAR archive (renderer + electron bootstrap)
files:
  - out
  - package.json
  - "!**/*.map"

# The PyInstaller binary is placed outside ASAR in resources/backend/
extraResources:
  - from: ../backend/dist/
    to: backend
    filter:
      - "cadviewer-api"
      - "cadviewer-api.exe"
  # Bundled Python 3.11 embeddable zip (Windows only, ~12 MB)
  # Download before building: curl -Lo frontend/build-resources/python/python-3.11-embed-amd64.zip
  #   https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip
  - from: build-resources/python/
    to: python
    filter:
      - "python-3.11-embed-amd64.zip"

# ------- Platform targets -------

win:
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  sign: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
