version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - glb_cache:/tmp/cadviewer_glb
    environment:
      - GLB_DIR=/tmp/cadviewer_glb
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  glb_cache:
