services:
  backend:
    image: ghcr.io/duncan-industries/cadviewer-backend:latest
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - glb_cache:/tmp/cadviewer_glb
    environment:
      - GLB_DIR=/tmp/cadviewer_glb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/duncan-industries/cadviewer-frontend:latest
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  glb_cache:
